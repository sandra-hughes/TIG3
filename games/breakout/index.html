<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Breakout — TIG3</title>
<link rel="stylesheet" href="../../style.css" />
<link rel="stylesheet" href="style.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E🎮%3C/text%3E%3C/svg%3E" />
</head>
<body>
<div class="stars"></div>
<main class="game-wrap">
  <nav class="gamenav">
    <a href="../../">← back to TIG3</a>
    <h1>Neon Breakout</h1>
  </nav>

  <div class="hud">
    <div><span class="hud-label">SCORE</span> <span id="score">0</span></div>
    <div><span class="hud-label">LIVES</span> <span id="lives">3</span></div>
    <div><span class="hud-label">LEVEL</span> <span id="level">1</span></div>
    <div><span class="hud-label">BEST</span> <span id="best">0</span></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="game" width="800" height="600"></canvas>
    <div id="overlay" class="overlay">
      <h2 id="overlay-title">Neon Breakout</h2>
      <p id="overlay-text">Move the paddle with your <b>mouse</b> or <b>←/→ arrow keys</b>. Press <b>Space</b> to launch.</p>
      <button id="start-btn">Start</button>
    </div>
  </div>

  <p class="help">
    Controls: mouse / ← → / Space to launch / P to pause
  </p>
</main>
<script src="main.js"></script>
</body>
</html>
